name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='scripts/' --exclude='DISPATCH.md'
          path: theme/d4jsp-dark/
          remote_path: ${{ secrets.HOSTINGER_WP_PATH }}/wp-content/themes/d4jsp-dark/
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Deploy .htaccess
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: .htaccess
          remote_path: ${{ secrets.HOSTINGER_WP_PATH }}/
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_user: ${{ secrets.HOSTINGER_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
